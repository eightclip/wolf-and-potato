version: '3.8'

services:
  wolf-potato-bridge:
    build: .
    image: wolf-potato-bridge
    container_name: wolf-potato-bridge
    restart: unless-stopped
    env_file:
      - .env
    # Same network as the GAEDHD bridge so it can reach the MQTT broker
    network_mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
